<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Convites Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#faf5ff;--card:#fff;--border:#e9d5ff;--text:#1e1b4b;--muted:#6b7280;--accent:#9333ea;--accent2:#db2777;--surface:#f3e8ff;}
body.dark{--bg:#0f0f13;--card:#1a1a24;--border:#2a2a3a;--text:#f0f0ff;--muted:#888aaa;--accent:#c084fc;--accent2:#f472b6;--surface:#22222f;}
body{background:var(--bg);color:var(--text);font-family:'Nunito','Segoe UI',sans-serif;min-height:100vh;transition:background .3s,color .3s;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px;opacity:.4;}
.btn{cursor:pointer;border:none;border-radius:10px;padding:8px 16px;font-family:inherit;font-weight:700;font-size:13px;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px #9333ea44;}
.btn-primary:disabled{opacity:.5;transform:none;cursor:not-allowed;}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:8px;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface);color:var(--text);}
.btn-icon{background:transparent;border:1px solid var(--border);border-radius:7px;padding:3px 9px;cursor:pointer;font-size:14px;font-weight:800;color:var(--text);transition:all .15s;}
.btn-icon:hover{background:var(--surface);}
input,textarea,select{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:9px 13px;font-family:inherit;font-size:14px;width:100%;outline:none;transition:border-color .2s;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:70px;}
label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px #9333ea12;}
.logo-title{font-family:'Playfair Display',serif;font-weight:900;font-size:17px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.verse-box{display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:12px;padding:6px 14px;flex:1;max-width:420px;border:1px solid var(--border);}
.tabs{background:var(--card);border-bottom:1px solid var(--border);padding:0 14px;display:flex;gap:2px;overflow-x:auto;}
.tab{cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:inherit;font-weight:700;font-size:12px;padding:10px 12px;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:8px 8px 0 0;}
.content{padding:18px;max-width:1200px;margin:0 auto;}
.content.kanban-mode{max-width:100%;}
.fade-in{animation:fi .3s ease;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:16px;}
.ch{transition:all .2s;}
.ch:hover{transform:translateY(-2px);box-shadow:0 8px 25px #9333ea22;}
.grid-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:12px;margin-bottom:20px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid-themes{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;}
.grid-ideas{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.stat-card{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);border-left-width:4px;transition:all .2s;}
.stat-card:hover{transform:translateY(-2px);}
.kanban-wrap{display:flex;gap:12px;overflow-x:auto;align-items:flex-start;padding-bottom:12px;}
.kanban-col{min-width:260px;max-width:260px;background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;flex-shrink:0;}
.kanban-col.drag-over{border:2px dashed var(--accent);background:var(--surface);}
.col-header{padding:11px 13px;display:flex;align-items:center;gap:7px;}
.col-body{padding:9px;display:flex;flex-direction:column;gap:7px;min-height:80px;}
.k-card{background:var(--surface);border-radius:10px;padding:11px;border:1px solid var(--border);border-left-width:4px;cursor:grab;transition:all .15s;}
.k-card:hover{box-shadow:0 4px 12px #9333ea22;}
.tag{display:inline-block;border-radius:7px;padding:1px 7px;font-size:11px;font-weight:700;margin:1px;}
.badge{border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;}
.modal-overlay{position:fixed;inset:0;background:#0008;z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--card);border-radius:18px;padding:26px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px #0007;border:1px solid var(--border);}
.mini-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px;}
.mini-stat{background:var(--surface);border-radius:9px;padding:9px 5px;text-align:center;}
.mini-stat-val{font-size:21px;font-weight:900;}
.mini-stat-lbl{font-size:10px;color:var(--muted);font-weight:700;}
.hist-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;align-items:center;}
.orc-item{background:var(--card);border-radius:12px;padding:13px 15px;border:1px solid var(--border);border-left-width:4px;margin-bottom:9px;}
.month-group{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;}
.month-header{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;background:var(--surface);}
.month-header:hover{background:var(--border);}
.month-body{padding:0 16px;}
.theme-group{border-bottom:1px solid var(--border);}
.theme-row{padding:9px 0;display:flex;align-items:center;gap:8px;cursor:pointer;}
.theme-dates{padding:4px 0 8px 20px;}
.search-box{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:9px 13px;font-family:inherit;font-size:14px;width:100%;outline:none;margin-bottom:16px;}
.search-box:focus{border-color:var(--accent);}
.footer{background:var(--card);border-top:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:center;gap:12px;margin-top:30px;}
@media(max-width:700px){.grid-2{grid-template-columns:1fr;}.verse-box{display:none;}.modal-box{padding:18px;}}
</style>
</head>
<body>

<div class="header">
  <div style="position:relative;cursor:pointer" onclick="document.getElementById('logoUpload').click()" title="Clique para trocar a logo">
    <img id="logoImg" src="" alt="" style="width:42px;height:42px;border-radius:10px;object-fit:cover;display:none;border:2px solid var(--border)"/>
    <div id="logoPlaceholder" style="width:42px;height:42px;border-radius:10px;background:var(--surface);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:18px">📷</div>
    <input type="file" id="logoUpload" accept="image/*" onchange="changeLogo(event)" style="display:none"/>
  </div>
  <div>
    <div id="businessTitle" class="logo-title" onclick="editTitle()" title="Clique para editar" style="cursor:pointer">Convites Studio</div>
    <div style="font-size:10px;color:var(--muted)">Gestão Inteligente</div>
  </div>
  <div style="flex:1"></div>
  <div class="verse-box">
    <span style="font-size:15px">✝️</span>
    <div><span style="font-style:italic;font-size:11px;color:var(--text)" id="verseText"></span><span style="color:var(--accent);font-weight:700;font-size:11px;margin-left:4px" id="verseRef"></span></div>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="toggleDark()" id="darkBtn">🌙</button>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-tab="dashboard">🏠 Início</button>
  <button class="tab" data-tab="kanban">📋 Tarefas</button>
  <button class="tab" data-tab="ideas">💡 Ideias</button>
  <button class="tab" data-tab="convites">🎨 Convites do Dia</button>
  <button class="tab" data-tab="orcamentos">💬 Orçamentos</button>
  <button class="tab" data-tab="library">📚 Biblioteca</button>
  <button class="tab" data-tab="busca">🔍 Busca</button>
</div>

<div id="page-dashboard" class="content fade-in"></div>
<div id="page-kanban" class="content kanban-mode fade-in hidden"></div>
<div id="page-ideas" class="content fade-in hidden"></div>
<div id="page-convites" class="content fade-in hidden"></div>
<div id="page-orcamentos" class="content fade-in hidden"></div>
<div id="page-library" class="content fade-in hidden"></div>
<div id="page-busca" class="content fade-in hidden"></div>

<div class="modal-overlay hidden" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modalBox"></div>
</div>

<div class="footer">
  <button class="btn btn-ghost btn-sm" onclick="exportData()" style="font-size:13px">💾 Exportar Dados</button>
  <label class="btn btn-ghost btn-sm" style="cursor:pointer;font-size:13px">📂 Importar Dados<input type="file" accept=".json" onchange="importData(event)" style="display:none"/></label>
  <span style="color:var(--border)">|</span>
  <span style="font-size:12px;color:var(--muted)">Convites Studio · Gestão Inteligente</span>
</div>

<style>.hidden{display:none!important;}</style>

<script>
// ═══ VERSES ═══
const VERSES=[
  {text:"Porque sou eu que conheço os planos que tenho para vocês, diz o Senhor.",ref:"Jeremias 29:11"},
  {text:"Tudo posso naquele que me fortalece.",ref:"Filipenses 4:13"},
  {text:"O Senhor é o meu pastor e nada me faltará.",ref:"Salmos 23:1"},
  {text:"Entrega o teu caminho ao Senhor; confia nele, e ele tudo fará.",ref:"Salmos 37:5"},
  {text:"Seja forte e corajoso. Não se apavore, pois o Senhor estará com você.",ref:"Josué 1:9"},
  {text:"Deleita-te no Senhor, e ele satisfará os desejos do teu coração.",ref:"Salmos 37:4"},
  {text:"Porque Deus não nos deu espírito de covardia, mas de poder e amor.",ref:"2 Timóteo 1:7"},
  {text:"Busca primeiro o Reino de Deus e todas estas coisas serão acrescentadas.",ref:"Mateus 6:33"},
  {text:"Com Deus tudo é possível.",ref:"Mateus 19:26"},
  {text:"O Senhor te abençoe e te guarde.",ref:"Números 6:24"},
  {text:"Alegrai-vos sempre no Senhor; outra vez digo, alegrai-vos.",ref:"Filipenses 4:4"},
  {text:"A fé é a certeza daquilo que esperamos.",ref:"Hebreus 11:1"},
  {text:"Não te deixes vencer pelo mal, mas vence o mal com o bem.",ref:"Romanos 12:21"},
  {text:"Confia no Senhor de todo o teu coração.",ref:"Provérbios 3:5"},
  {text:"Aquele que começou boa obra em você a completará.",ref:"Filipenses 1:6"},
  {text:"Vinde a mim todos os que estão cansados e eu vos aliviarei.",ref:"Mateus 11:28"},
  {text:"O Senhor é a minha luz e a minha salvação.",ref:"Salmos 27:1"},
  {text:"Deus é refúgio e fortaleza, auxílio sempre presente.",ref:"Salmos 46:1"},
  {text:"Não andem ansiosos, mas em tudo apresentem seus pedidos a Deus.",ref:"Filipenses 4:6"},
  {text:"Não temas, porque eu sou contigo.",ref:"Isaías 41:10"},
  {text:"Ele dá força ao cansado e vigor ao que não tem forças.",ref:"Isaías 40:29"},
  {text:"Grandes coisas fez o Senhor por nós, e por isso estamos alegres.",ref:"Salmos 126:3"},
  {text:"Deus é amor, e quem permanece no amor permanece em Deus.",ref:"1 João 4:16"},
  {text:"O Senhor te guardará de todo o mal.",ref:"Salmos 121:7"},
];

// ═══ HELPERS ═══
const uid=()=>Math.random().toString(36).slice(2,10);
const nowISO=()=>new Date().toISOString();
const fmtDate=iso=>iso?new Date(iso).toLocaleDateString('pt-BR'):'—';
const fmtDateInput=iso=>iso?new Date(iso).toISOString().slice(0,10):'';
const diffDays=(a,b)=>Math.round((new Date(b)-new Date(a))/86400000);
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ═══ STATE ═══
const defaultColumns=[
  {id:'urgente',title:'🔥 Urgente',color:'#ef4444'},
  {id:'hoje',title:'📅 Fazer Hoje',color:'#f97316'},
  {id:'semana',title:'📆 Durante a Semana',color:'#3b82f6'},
  {id:'mes',title:'🗓️ Durante o Mês',color:'#a855f7'},
  {id:'andamento',title:'⚙️ Em Andamento',color:'#06b6d4'},
  {id:'criar',title:'🎨 Convites para Criar',color:'#ec4899'},
  {id:'melhorias',title:'📈 Melhorias do Negócio',color:'#14b8a6'},
  {id:'concluido',title:'✅ Concluído',color:'#22c55e'},
];
let S={
  columns:[...defaultColumns],
  cards:[],ideas:[],convitesDodia:[],orcamentos:[],themes:[],
  dark:false,tab:'dashboard'
};
let dragCardId=null,dragColId=null,editingCard=null,editingIdea=null,editingTheme=null;
// track expanded months/themes
let expandedMonths={},expandedThemes={};

// ═══ DARK / VERSE ═══
function toggleDark(){S.dark=!S.dark;document.body.classList.toggle('dark',S.dark);document.getElementById('darkBtn').textContent=S.dark?'☀️':'🌙';render();}
function setVerse(){const v=VERSES[new Date().getDate()%VERSES.length];document.getElementById('verseText').textContent=`"${v.text}" `;document.getElementById('verseRef').textContent=v.ref;}

// ═══ TABS ═══
function switchTab(t){
  S.tab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('[id^="page-"]').forEach(p=>p.classList.toggle('hidden',p.id!=='page-'+t));
  render();
}
document.getElementById('tabs').addEventListener('click',e=>{if(e.target.dataset.tab)switchTab(e.target.dataset.tab);});

// ═══ MODAL ═══
function openModal(html){document.getElementById('modalBox').innerHTML=html;document.getElementById('modalOverlay').classList.remove('hidden');}
function closeModal(){document.getElementById('modalOverlay').classList.add('hidden');editingCard=editingIdea=editingTheme=null;}

// ═══ RENDER ═══
function render(){
  const t=S.tab;
  if(t==='dashboard')renderDashboard();
  else if(t==='kanban')renderKanban();
  else if(t==='ideas')renderIdeas();
  else if(t==='convites')renderConvites();
  else if(t==='orcamentos')renderOrcamentos();
  else if(t==='library')renderLibrary();
  else if(t==='busca')renderBusca();
}

// ═══ THEME ANALYSIS ═══
function themeInsight(models,orc){
  // Unified logic used everywhere: library, dashboard analysis, orders
  const orcInfo=orc>0?` · ${orc} orçamento(s) recebido(s)`:'';
  if(models===0){
    return{text:'Nenhum modelo cadastrado. Crie modelos para este tema!',cor:'#ef4444',level:'insuficiente'};
  }
  if(models<=4){
    const falta=15-models;
    return{text:`⚠️ Estoque insuficiente (${models} modelo(s)). Você precisa criar mais ${falta} modelos para oferecer variedade mínima ao cliente${orcInfo}.`,cor:'#ef4444',level:'insuficiente'};
  }
  if(models<=14){
    const falta=15-models;
    return{text:`📦 Estoque básico (${models} modelo(s)). Crie mais ${falta} modelo(s) para atingir o nível mínimo recomendado de 15${orcInfo}.`,cor:'#f97316',level:'basico'};
  }
  if(models>=15&&models<=29){
    return{text:`✅ Bem abastecida (${models} modelo(s)). Cliente encontra variedade sem precisar buscar fora${orcInfo}.`,cor:'#22c55e',level:'bom'};
  }
  return{text:`🌟 Biblioteca ampla (${models} modelo(s)). Excelente variedade! Não é prioridade criar mais agora${orcInfo}.`,cor:'#3b82f6',level:'otimo'};
}

// ═══ STATS HELPERS ═══
function getOrcCount(theme){const o=S.orcamentos.find(x=>x.theme.toLowerCase()===theme.toLowerCase());return o?o.count:0;}
function getMonthProd(theme){
  const now=new Date(),m=now.getMonth(),y=now.getFullYear();
  return S.convitesDodia.filter(p=>{const d=new Date(p.date);return d.getMonth()===m&&d.getFullYear()===y&&p.theme.toLowerCase()===theme.toLowerCase();}).reduce((a,p)=>a+Number(p.qty),0);
}
function getTotalProd(theme){return S.convitesDodia.filter(p=>p.theme.toLowerCase()===theme.toLowerCase()).reduce((a,p)=>a+Number(p.qty),0);}
function pColor(p){return{Baixa:'#22c55e',Média:'#eab308',Alta:'#f97316',Urgente:'#ef4444'}[p]||'#94a3b8';}

// ═══ DASHBOARD ═══
function renderDashboard(){
  const open=S.cards.filter(c=>c.columnId!=='concluido').length;
  const done=S.cards.filter(c=>c.columnId==='concluido').length;
  const week=S.convitesDodia.filter(p=>diffDays(p.date,nowISO())<=7).reduce((a,p)=>a+Number(p.qty),0);
  const month=S.convitesDodia.filter(p=>diffDays(p.date,nowISO())<=30).reduce((a,p)=>a+Number(p.qty),0);
  const byTheme={};S.convitesDodia.forEach(p=>{byTheme[p.theme]=(byTheme[p.theme]||0)+Number(p.qty);});
  const topProd=Object.entries(byTheme).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topOrc=[...S.orcamentos].sort((a,b)=>b.count-a.count).slice(0,5);

  // alerts
  const overdue=S.cards.filter(c=>c.columnId!=='concluido'&&c.dueDate&&diffDays(c.dueDate,nowISO())>0);
  const lowStock=S.themes.filter(t=>Number(t.models)<15);
  let alertsHtml='';
  if(overdue.length>0){
    alertsHtml+=`<div style="background:#ef444415;border:1.5px solid #ef444444;border-radius:12px;padding:14px 16px;margin-bottom:10px;border-left:4px solid #ef4444">
      <div style="font-weight:800;color:#ef4444;margin-bottom:8px">⚠️ ${overdue.length} tarefa(s) atrasada(s)</div>
      ${overdue.map(c=>`<div style="font-size:13px;padding:3px 0;display:flex;gap:8px"><span style="flex:1;font-weight:600">${esc(c.title)}</span><span style="color:#ef4444;font-size:12px">venceu ${fmtDate(c.dueDate)}</span></div>`).join('')}
    </div>`;
  }
  if(lowStock.length>0){
    alertsHtml+=`<div style="background:#f9731615;border:1.5px solid #f9731644;border-radius:12px;padding:14px 16px;margin-bottom:10px;border-left:4px solid #f97316">
      <div style="font-weight:800;color:#f97316;margin-bottom:8px">🎨 Temas com poucos modelos (menos de 15)</div>
      ${lowStock.map(t=>`<div style="font-size:13px;padding:3px 0;display:flex;gap:8px"><span style="flex:1;font-weight:600">${esc(t.name)}</span><span style="color:#f97316;font-size:12px">${t.models} modelos</span></div>`).join('')}
    </div>`;
  }

  // analise mes
  const now=new Date(),mes=now.toLocaleString('pt-BR',{month:'long',year:'numeric'});
  let analiseMes='';
  S.themes.forEach(t=>{
    const orc=getOrcCount(t.name),prodMes=getMonthProd(t.name),models=Number(t.models||0);
    if(orc===0&&prodMes===0)return;
    const insight=themeInsight(models,orc);
    const meta=models<15?15:models<20?20:models<35?35:models;
    const precisa=Math.max(0,meta-models);
    analiseMes+=`<div style="background:${insight.cor}10;border-left:4px solid ${insight.cor};border-radius:10px;padding:12px;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        <strong style="color:${insight.cor};font-size:14px">🎨 ${esc(t.name)}</strong>
        ${precisa>0?`<span style="margin-left:auto;background:${insight.cor}22;color:${insight.cor};padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700">+${precisa} necessários</span>`:''}
      </div>
      <p style="font-size:13px;line-height:1.7">Este mês: <strong>${orc}</strong> orçamento(s) · <strong>${prodMes}</strong> produzido(s) · <strong>${models}</strong> modelo(s). ${insight.text}</p>
    </div>`;
  });

  document.getElementById('page-dashboard').innerHTML=`
    <h2 style="font-family:'Playfair Display',serif;font-size:26px;margin-bottom:18px">Painel Principal ✨</h2>
    <div class="grid-stats">
      ${[
        {label:'Tarefas Abertas',value:open,emoji:'📋',color:'#3b82f6'},
        {label:'Concluídas',value:done,emoji:'✅',color:'#22c55e'},
        {label:'Ideias',value:S.ideas.length,emoji:'💡',color:'#eab308'},
        {label:'Orçamentos',value:S.orcamentos.length,emoji:'💬',color:'#ec4899'},
        {label:'Semana',value:week,emoji:'⚡',color:'#f97316'},
        {label:'Mês',value:month,emoji:'📈',color:'#a855f7'},
        {label:'Temas',value:S.themes.length,emoji:'🎨',color:'#14b8a6'},
      ].map(s=>`<div class="stat-card ch" style="border-left-color:${s.color}">
        <div style="font-size:22px;margin-bottom:4px">${s.emoji}</div>
        <div style="font-size:26px;font-weight:900;color:${s.color}">${s.value}</div>
        <div style="font-size:11px;color:var(--muted);font-weight:600">${s.label}</div>
      </div>`).join('')}
    </div>
    ${alertsHtml}
    <div class="grid-2" style="margin-bottom:16px">

function renderKanban(){
  document.getElementById('page-kanban').innerHTML=`<div style="padding:18px">

      <button class="btn btn-primary btn-sm" onclick="addColumn()">+ Coluna</button>
    </div>
    <div class="kanban-wrap" id="kanbanWrap">
      ${S.columns.map(col=>{
        const cards=S.cards.filter(c=>c.columnId===col.id);
        return `<div class="kanban-col" id="col-${col.id}" draggable="true"
          ondragstart="colDragStart('${col.id}')"
          ondragover="event.preventDefault();document.getElementById('col-${col.id}').classList.add('drag-over')"
          ondrop="colDrop('${col.id}')"
          ondragleave="document.getElementById('col-${col.id}').classList.remove('drag-over')">
          <div class="col-header" style="border-bottom:3px solid ${col.color}">
            <span style="flex:1;font-weight:800;font-size:13px">${col.title}</span>
            <span class="badge" style="background:${col.color}33;color:${col.color}">${cards.length}</span>

          </div>
          <div class="col-body" id="body-${col.id}"
            ondragover="event.preventDefault()"
            ondrop="cardDrop('${col.id}')">
            ${cards.map(card=>renderCard(card,col)).join('')}
            <button class="btn btn-ghost btn-sm" style="width:100%;border-style:dashed" onclick="openCardModal(null,'${col.id}')">+ Cartão</button>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderCard(card,col){
  const pc=pColor(card.priority);
  const tags=card.tags?card.tags.split(',').map(t=>`<span class="tag" style="background:var(--border)">${t.trim()}</span>`).join(''):'';
  const daysOld=col.id!=='concluido'?diffDays(card.createdAt,nowISO()):0;
  const overdue=daysOld>=1;

  // due date warning
  let dueWarn='';
  if(card.dueDate&&col.id!=='concluido'){
    const daysLeft=diffDays(nowISO(),card.dueDate);
    if(daysLeft<0)dueWarn=`<div style="font-size:11px;color:#ef4444;background:#ef444415;padding:3px 8px;border-radius:6px;margin-bottom:5px;font-weight:700">⚠️ Atrasada ${Math.abs(daysLeft)} dia(s)</div>`;
    else if(daysLeft<=2)dueWarn=`<div style="font-size:11px;color:#eab308;background:#eab30815;padding:3px 8px;border-radius:6px;margin-bottom:5px;font-weight:700">⏰ Vence em ${daysLeft===0?'hoje':daysLeft+' dia(s)'}</div>`;
  }

  const completed=col.id==='concluido'&&card.completedAt?`<div style="font-size:11px;color:#22c55e;margin-top:5px">✅ ${fmtDate(card.completedAt)} · ${diffDays(card.createdAt,card.completedAt)} dias</div>`:'';
  const completeBtn=col.id!=='concluido'?`<button class="btn btn-primary btn-sm" style="flex:1" onclick="completeCard('${card.id}','${col.id}')">✅ Concluir</button>`:'';

  return `<div class="k-card" id="kcard-${card.id}" draggable="true"
    style="border-left-color:${dueWarn.includes('Atrasada')?'#ef4444':dueWarn.includes('Vence')?'#eab308':pc}"
    ondragstart="cardDragStart('${card.id}')">
    <div style="font-weight:700;font-size:13px;margin-bottom:3px">${esc(card.title)}</div>
    ${card.description?`<div style="font-size:12px;color:var(--muted);margin-bottom:5px">${esc(card.description)}</div>`:''}
    ${dueWarn}
    <div style="margin-bottom:5px">
      ${card.priority?`<span class="tag" style="background:${pc}22;color:${pc}">${card.priority}</span>`:''}
      ${tags}
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:7px">📅 Criado: ${fmtDate(card.createdAt)}${card.dueDate?` · Prazo: ${fmtDate(card.dueDate)}`:''}</div>
    <div style="display:flex;gap:5px">
      ${completeBtn}
      <button class="btn btn-ghost btn-sm" onclick="openCardModal('${card.id}')">✏️</button>
      <button class="btn btn-ghost btn-sm" style="color:#ef4444" onclick="deleteCard('${card.id}')">🗑️</button>
    </div>
    ${completed}
  </div>`;
}

function cardDragStart(id){dragCardId=id;}
function colDragStart(id){dragColId=id;}
function cardDrop(colId){
  if(!dragCardId)return;
  S.cards=S.cards.map(c=>c.id===dragCardId?{...c,columnId:colId}:c);
  dragCardId=null;renderKanban();
}
function colDrop(colId){
  if(dragCardId){cardDrop(colId);return;}
  if(!dragColId||dragColId===colId){dragColId=null;return;}
  const cols=[...S.columns];
  const from=cols.findIndex(c=>c.id===dragColId),to=cols.findIndex(c=>c.id===colId);
  const[moved]=cols.splice(from,1);cols.splice(to,0,moved);
  S.columns=cols;dragColId=null;renderKanban();
}
function addColumn(){const t=prompt('Nome da nova coluna:');if(t){S.columns.push({id:uid(),title:t,color:'#6366f1'});renderKanban();}}
function renameCol(id){const col=S.columns.find(c=>c.id===id);const t=prompt('Novo nome:',col?.title);if(t){S.columns=S.columns.map(c=>c.id===id?{...c,title:t}:c);renderKanban();}}
function deleteCol(id){if(confirm('Excluir coluna?')){S.columns=S.columns.filter(c=>c.id!==id);renderKanban();}}
function completeCard(id,colId){
  const card=S.cards.find(c=>c.id===id);
  S.cards=S.cards.map(c=>c.id===id?{...c,columnId:'concluido',completedAt:nowISO()}:c);
  // if it was a "criar" card, update library
  if(colId==='criar'&&card){
    const match=card.title.match(/(\d+)\s+modelo[s]?\s+de\s+(.+)/i);
    if(match){
      const qty=parseInt(match[1]),themeName=match[2].trim();
      const existing=S.themes.find(t=>t.name.toLowerCase()===themeName.toLowerCase());
      if(existing){S.themes=S.themes.map(t=>t.id===existing.id?{...t,models:Number(t.models)+qty}:t);}
      else{S.themes.push({id:uid(),name:themeName,models:qty,observations:'Criado automaticamente',createdAt:nowISO()});}
    }
  }
  renderKanban();
}
function deleteCard(id){S.cards=S.cards.filter(c=>c.id!==id);render();}

function openCardModal(id,defaultCol){
  const card=id?S.cards.find(c=>c.id===id):{columnId:defaultCol||'hoje',title:'',description:'',priority:'Média',tags:'',observations:'',dueDate:''};
  editingCard=id;
  const priorityCols=[
    {id:'hoje',label:'📅 Fazer Hoje'},
    {id:'semana',label:'📆 Durante a Semana'},
    {id:'mes',label:'🗓️ Durante o Mês'},
  ];
  const colOpts=priorityCols.map(c=>`<option value="${c.id}"${card.columnId===c.id?' selected':''}>${c.label}</option>`).join('');
  const today=new Date().toISOString().slice(0,10);
  openModal(`
    <h3 style="font-weight:800;margin-bottom:16px;font-size:17px">${id?'Editar Cartão':'Novo Cartão'}</h3>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><label>Título *</label><input id="mTitle" value="${esc(card.title)}" placeholder="Título"/></div>
      <div><label>Descrição</label><textarea id="mDesc">${esc(card.description||'')}</textarea></div>
      <div><label>Coluna</label><select id="mCol">${colOpts}</select></div>

      <div><label>Data de Prazo</label><input type="date" id="mDue" value="${card.dueDate?fmtDateInput(card.dueDate):today}"/></div>
      <div><label>Tags (vírgula)</label><input id="mTags" value="${esc(card.tags||'')}" placeholder="ex: safari, urgente"/></div>
      <div><label>Observações</label><textarea id="mObs">${esc(card.observations||'')}</textarea></div>
      <div style="display:flex;gap:9px;margin-top:4px">

function saveCard(){
  const title=document.getElementById('mTitle').value.trim();if(!title)return;
  const d={id:editingCard,title,description:document.getElementById('mDesc').value,columnId:document.getElementById('mCol').value,priority:document.getElementById('mPri').value,tags:document.getElementById('mTags').value,observations:document.getElementById('mObs').value,dueDate:document.getElementById('mDue').value?new Date(document.getElementById('mDue').value).toISOString():''};
  if(editingCard){S.cards=S.cards.map(c=>c.id===editingCard?{...c,...d}:c);}

// ═══ CONVITES DO DIA ═══
function renderConvites(){
  const today=new Date().toDateString();
  const todayItems=S.convitesDodia.filter(p=>new Date(p.date).toDateString()===today);
  const week=S.convitesDodia.filter(p=>diffDays(p.date,nowISO())<=7).reduce((a,p)=>a+Number(p.qty),0);
  const month=S.convitesDodia.filter(p=>diffDays(p.date,nowISO())<=30).reduce((a,p)=>a+Number(p.qty),0);
  const themeOpts=S.themes.map(t=>`<option value="${esc(t.name)}">`).join('');

  // Build monthly history
  const monthMap={};
  S.convitesDodia.forEach(p=>{
    const d=new Date(p.date);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label=d.toLocaleString('pt-BR',{month:'long',year:'numeric'});
    if(!monthMap[key]){monthMap[key]={label,total:0,themes:{}};}
    monthMap[key].total+=Number(p.qty);
    if(!monthMap[key].themes[p.theme]){monthMap[key].themes[p.theme]=[];}
    monthMap[key].themes[p.theme].push({qty:Number(p.qty),date:p.date,id:p.id});
  });
  const sortedMonths=Object.entries(monthMap).sort((a,b)=>b[0].localeCompare(a[0]));

  let histHtml=sortedMonths.map(([mkey,mdata])=>{
    const expanded=expandedMonths[mkey];
    const themesHtml=Object.entries(mdata.themes).sort((a,b)=>{
      const ta=b[1].reduce((s,x)=>s+x.qty,0),tb=a[1].reduce((s,x)=>s+x.qty,0);return ta-tb;
    }).map(([tname,entries])=>{
      const total=entries.reduce((s,x)=>s+x.qty,0);
      const tkey=mkey+'-'+tname;
      const tExpanded=expandedThemes[tkey];
      const datesHtml=entries.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e=>`
        <div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;color:var(--muted)">
          <span style="flex:1">📅 ${fmtDate(e.date)}</span>
          <span style="font-weight:700;color:var(--accent)">${e.qty} convite(s)</span>
          <button class="btn btn-ghost btn-sm" style="padding:2px 7px;color:#ef4444;font-size:11px" onclick="deleteConvite('${e.id}')">🗑️</button>
        </div>`).join('');
      return `<div class="theme-group">
        <div class="theme-row" onclick="toggleTheme('${tkey}')">
          <span style="font-size:12px;color:var(--muted)">${tExpanded?'▼':'▶'}</span>
          <span style="flex:1;font-weight:600;font-size:13px">🎨 ${esc(tname)}</span>
          <span style="font-weight:800;color:var(--accent);font-size:14px">${total}</span>
        </div>
        ${tExpanded?`<div class="theme-dates">${datesHtml}</div>`:''}
      </div>`;
    }).join('');
    return `<div class="month-group">
      <div class="month-header" onclick="toggleMonth('${mkey}')">
        <span style="font-size:14px">${expanded?'▼':'▶'}</span>
        <span style="flex:1;font-weight:800;font-size:15px;text-transform:capitalize">${mdata.label}</span>
        <span class="badge" style="background:var(--accent)22;color:var(--accent)">${mdata.total} convites</span>
      </div>
      ${expanded?`<div class="month-body" style="padding:8px 16px">${themesHtml}</div>`:''}
    </div>`;
  }).join('');

  document.getElementById('page-convites').innerHTML=`
    <h2 style="font-family:'Playfair Display',serif;font-size:26px;margin-bottom:6px">🎨 Convites do Dia</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px">Registre os convites produzidos hoje. Use +1/-1 para ajustar.</p>
    <div style="display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px">
      <input list="themeListC" id="cTheme" placeholder="🎨 Tema..." style="flex:2;min-width:150px"/>
      <datalist id="themeListC">${themeOpts}</datalist>
      <input type="number" id="cQty" value="1" min="1" style="flex:1;min-width:70px"/>
      <button class="btn btn-primary" onclick="addConvite()">+ Registrar</button>
    </div>

    <div class="card" style="margin-bottom:14px">
      <h3 style="font-weight:800;margin-bottom:12px">📅 Produzidos Hoje</h3>
      ${todayItems.length===0?'<p style="color:var(--muted);font-size:13px">Nenhum registro hoje ainda.</p>':todayItems.map(p=>`
        <div class="hist-item">
          <span style="flex:1;font-weight:600">🎨 ${esc(p.theme)}</span>
          <div style="display:flex;align-items:center;gap:6px">
            <button class="btn-icon" onclick="adjustConvite('${p.id}',-1)">−</button>
            <span style="font-weight:900;font-size:18px;color:var(--accent);min-width:30px;text-align:center">${p.qty}</span>
            <button class="btn-icon" onclick="adjustConvite('${p.id}',1)">+</button>
          </div>
          <button class="btn btn-ghost btn-sm" style="color:#ef4444" onclick="deleteConvite('${p.id}')">🗑️</button>
        </div>`).join('')}
    </div>

    <div class="grid-2" style="margin-bottom:16px">
      <div class="card" style="text-align:center">
        <div style="font-size:38px;font-weight:900;color:var(--accent)">${week}</div>
        <div style="color:var(--muted);font-size:13px">⚡ Esta semana</div>
      </div>
      <div class="card" style="text-align:center">
        <div style="font-size:38px;font-weight:900;color:var(--accent2)">${month}</div>
        <div style="color:var(--muted);font-size:13px">📈 Este mês</div>
      </div>
    </div>

    <div class="card">
      <h3 style="font-weight:800;margin-bottom:12px">📋 Histórico por Mês</h3>
      ${histHtml||'<p style="color:var(--muted);font-size:13px">Nenhum registro ainda.</p>'}
    </div>`;
}
function toggleMonth(key){expandedMonths[key]=!expandedMonths[key];renderConvites();}
function toggleTheme(key){expandedThemes[key]=!expandedThemes[key];renderConvites();}
function addConvite(){
  const theme=document.getElementById('cTheme').value.trim();
  const qty=parseInt(document.getElementById('cQty').value)||1;
  if(!theme)return;
  const today=new Date().toDateString();
  const ex=S.convitesDodia.find(p=>p.theme.toLowerCase()===theme.toLowerCase()&&new Date(p.date).toDateString()===today);
  if(ex){S.convitesDodia=S.convitesDodia.map(p=>p.id===ex.id?{...p,qty:Number(p.qty)+qty}:p);}
  else{S.convitesDodia.push({id:uid(),theme,qty,date:nowISO()});}
  document.getElementById('cTheme').value='';
  document.getElementById('cQty').value='1';
  renderConvites();renderDashboard();
}
function adjustConvite(id,delta){
  S.convitesDodia=S.convitesDodia.map(p=>{
    if(p.id!==id)return p;
    const newQty=Number(p.qty)+delta;
    return newQty<=0?null:{...p,qty:newQty};
  }).filter(Boolean);
  renderConvites();renderDashboard();
}
function deleteConvite(id){S.convitesDodia=S.convitesDodia.filter(x=>x.id!==id);renderConvites();renderDashboard();}

            <span style="font-weight:900;font-size:18px;min-width:32px;text-align:center;color:${o.count>=5?'#ef4444':'var(--text)'}">${o.count}x</span>
            <button class="btn-icon" onclick="adjustOrc('${o.id}',1)">+</button>
          </div>
          <button class="btn btn-ghost btn-sm" style="color:#ef4444" onclick="deleteOrc('${o.id}')">🗑️</button>
        </div>
        ${insight?`<div style="font-size:12px;color:${insight.cor};background:${insight.cor}15;padding:8px 11px;border-radius:8px;border-left:3px solid ${insight.cor}">🤖 ${insight.text}</div>`:''}
      </div>`;
    }).join('')}
    ${S.orcamentos.length===0?'<p style="color:var(--muted)">Nenhum orçamento ainda.</p>':""}`;
}
function addOrc(){
  const i=document.getElementById('orcInput');const theme=i.value.trim();if(!theme)return;
  const ex=S.orcamentos.find(o=>o.theme.toLowerCase()===theme.toLowerCase());
  if(ex){S.orcamentos=S.orcamentos.map(o=>o.id===ex.id?{...o,count:o.count+1}:o);}
  else{S.orcamentos.push({id:uid(),theme,count:1,createdAt:nowISO()});}
  i.value='';renderOrcamentos();renderDashboard();
}
function adjustOrc(id,delta){
  S.orcamentos=S.orcamentos.map(o=>{
    if(o.id!==id)return o;
    const newCount=o.count+delta;
    return newCount<=0?null:{...o,count:newCount};
  }).filter(Boolean);
  renderOrcamentos();renderDashboard();
}
function deleteOrc(id){S.orcamentos=S.orcamentos.filter(x=>x.id!==id);renderOrcamentos();renderDashboard();}

// ═══ LIBRARY ═══
function renderLibrary(){
  document.getElementById('page-library').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <h2 style="font-family:'Playfair Display',serif;font-size:26px">📚 Biblioteca de Temas</h2>
      <button class="btn btn-primary" onclick="openThemeModal(null)">+ Novo Tema</button>
    </div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px">Cadastre todos os seus temas. A análise é baseada na quantidade mínima saudável de modelos para o cliente não buscar variedade em outro lugar.</p>
    <div class="grid-themes">
      ${S.themes.length===0?'<p style="color:var(--muted)">Nenhum tema ainda.</p>':S.themes.map(t=>{
        const models=Number(t.models||0),orc=getOrcCount(t.name),prodTotal=getTotalProd(t.name);
        const insight=themeInsight(models,orc);
        return `<div class="card ch">
          <div style="display:flex;gap:7px;margin-bottom:10px">
            <div style="flex:1;font-weight:800;font-size:15px">🎨 ${esc(t.name)}</div>
            <button class="btn btn-ghost btn-sm" onclick="openThemeModal('${t.id}')">✏️</button>
            <button class="btn btn-ghost btn-sm" style="color:#ef4444" onclick="deleteTheme('${t.id}')">🗑️</button>
          </div>
          <div class="mini-stats">
            <div class="mini-stat"><div class="mini-stat-val" style="color:var(--accent)">${models}</div><div class="mini-stat-lbl">MODELOS</div></div>
            <div class="mini-stat"><div class="mini-stat-val" style="color:#ec4899">${orc}</div><div class="mini-stat-lbl">ORÇAMENTOS</div></div>
            <div class="mini-stat"><div class="mini-stat-val" style="color:#f97316">${prodTotal}</div><div class="mini-stat-lbl">PRODUZIDOS</div></div>
          </div>
          <div style="font-size:12px;color:${insight.cor};background:${insight.cor}15;padding:9px 11px;border-radius:9px;border-left:3px solid ${insight.cor};line-height:1.6;margin-bottom:${t.observations?8:0}px">
            🤖 ${insight.text}
          </div>
          ${t.observations?`<div style="font-size:12px;color:var(--muted)">${esc(t.observations)}</div>`:''}
        </div>`;
      }).join('')}
    </div>`;
}
function openThemeModal(id){
  const t=id?S.themes.find(x=>x.id===id):{name:'',models:0,observations:''};editingTheme=id;
  openModal(`<h3 style="font-weight:800;margin-bottom:16px;font-size:17px">${id?'Editar Tema':'Novo Tema'}</h3>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><label>Nome do Tema *</label><input id="tName" value="${esc(t.name)}" placeholder="ex: Safari, Tiana"/></div>
      <div><label>Qtd de Modelos</label><input type="number" id="tModels" value="${t.models||0}" min="0"/></div>
      <div><label>Observações</label><textarea id="tObs">${esc(t.observations||'')}</textarea></div>
      <div style="display:flex;gap:9px;margin-top:4px">
        <button class="btn btn-primary" style="flex:1" onclick="saveTheme()">💾 Salvar</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      </div>
    </div>`);
}
function saveTheme(){
  const name=document.getElementById('tName').value.trim();if(!name)return;
  const d={name,models:parseInt(document.getElementById('tModels').value)||0,observations:document.getElementById('tObs').value};
  if(editingTheme){S.themes=S.themes.map(t=>t.id===editingTheme?{...t,...d}:t);}
  else{S.themes.push({...d,id:uid(),createdAt:nowISO()});}
  closeModal();renderLibrary();renderDashboard();
}
function deleteTheme(id){S.themes=S.themes.filter(x=>x.id!==id);renderLibrary();renderDashboard();}

// ═══ BUSCA ═══
function renderBusca(){
  const q=(document.getElementById('searchInput')||{}).value||'';
  const results=q.trim()?S.themes.filter(t=>t.name.toLowerCase().includes(q.toLowerCase())):[];

  let resultsHtml='';
  results.forEach(t=>{
    const totalProd=getTotalProd(t.name);
    const monthMap={};
    S.convitesDodia.filter(p=>p.theme.toLowerCase()===t.name.toLowerCase()).forEach(p=>{
      const d=new Date(p.date);
      const key=d.toLocaleString('pt-BR',{month:'long',year:'numeric'});
      monthMap[key]=(monthMap[key]||0)+Number(p.qty);
    });
    const monthRows=Object.entries(monthMap).map(([m,n])=>`<span style="background:var(--surface);border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700">${m}: <span style="color:var(--accent)">${n}</span></span>`).join(' ');
    const orc=getOrcCount(t.name);
    const insight=themeInsight(Number(t.models||0),orc);
    resultsHtml+=`<div class="card" style="margin-bottom:12px">
      <div style="font-weight:800;font-size:16px;margin-bottom:8px">🎨 ${esc(t.name)}</div>
      <div class="mini-stats" style="margin-bottom:10px">
        <div class="mini-stat"><div class="mini-stat-val" style="color:var(--accent)">${t.models}</div><div class="mini-stat-lbl">MODELOS</div></div>
        <div class="mini-stat"><div class="mini-stat-val" style="color:#ec4899">${orc}</div><div class="mini-stat-lbl">ORÇAMENTOS</div></div>
        <div class="mini-stat"><div class="mini-stat-val" style="color:#f97316">${totalProd}</div><div class="mini-stat-lbl">TOTAL PROD.</div></div>
      </div>
      ${monthRows?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">${monthRows}</div>`:''}
      <div style="font-size:12px;color:${insight.cor};background:${insight.cor}15;padding:8px 11px;border-radius:8px;border-left:3px solid ${insight.cor}">🤖 ${insight.text}</div>
    </div>`;
  });

  document.getElementById('page-busca').innerHTML=`
    <h2 style="font-family:'Playfair Display',serif;font-size:26px;margin-bottom:6px">🔍 Busca de Temas</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px">Pesquise um tema para ver seu histórico completo de produção por mês.</p>
    <input class="search-box" id="searchInput" placeholder="🔍 Digite o nome do tema..." value="${esc(q)}" oninput="renderBusca()"/>
    ${q&&results.length===0?`<p style="color:var(--muted)">Nenhum tema encontrado para "${esc(q)}".</p>`:resultsHtml}
    ${!q?`<p style="color:var(--muted)">Digite acima para buscar um tema.</p>`:''}`;
}

// ═══ LOGO & TITLE ═══
function changeLogo(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('logoImg').src=e.target.result;
    document.getElementById('logoImg').style.display='block';
    document.getElementById('logoPlaceholder').style.display='none';
    localStorage.setItem('convites_logo',e.target.result);
  };
  reader.readAsDataURL(file);event.target.value='';
}
function editTitle(){
  const cur=document.getElementById('businessTitle').textContent;
  const novo=prompt('Nome do seu negócio:',cur);
  if(novo&&novo.trim()){document.getElementById('businessTitle').textContent=novo.trim();localStorage.setItem('convites_title',novo.trim());}
}
function loadLogoAndTitle(){
  const logo=localStorage.getItem('convites_logo');
  if(logo){document.getElementById('logoImg').src=logo;document.getElementById('logoImg').style.display='block';document.getElementById('logoPlaceholder').style.display='none';}
  const title=localStorage.getItem('convites_title');
  if(title)document.getElementById('businessTitle').textContent=title;
}

// ═══ EXPORT / IMPORT ═══
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`convites-studio-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.json`;
  a.click();URL.revokeObjectURL(url);
}
function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const imp=JSON.parse(e.target.result);
      if(!imp.columns||!imp.cards)throw new Error('inválido');
      if(confirm('Isso substituirá todos os dados atuais. Confirma?')){S={...S,...imp};render();}
    }catch{alert('❌ Arquivo inválido.');}
  };
  reader.readAsText(file);event.target.value='';
}

// ═══ DASHBOARD ALERTS ═══
function buildDashAlerts(){
  const overdue=S.cards.filter(c=>c.columnId!=='concluido'&&c.dueDate&&diffDays(c.dueDate,nowISO())>0);
  const lowStock=S.themes.filter(t=>Number(t.models)<15);
  const el=document.getElementById('dashAlerts');if(!el)return;
  let html='';
  if(overdue.length>0){
    html+=`<div style="background:#ef444415;border:1.5px solid #ef444444;border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid #ef4444">
      <div style="font-weight:800;color:#ef4444;margin-bottom:8px">⚠️ ${overdue.length} tarefa(s) atrasada(s)</div>
      ${overdue.map(c=>`<div style="font-size:13px;display:flex;gap:8px"><span style="flex:1">${esc(c.title)}</span><span style="color:#ef4444;font-size:12px">venceu ${fmtDate(c.dueDate)}</span></div>`).join('')}
    </div>`;
  }
  if(lowStock.length>0){
    html+=`<div style="background:#f9731615;border:1.5px solid #f9731644;border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid #f97316">
      <div style="font-weight:800;color:#f97316;margin-bottom:8px">🎨 Temas com menos de 15 modelos</div>
      ${lowStock.map(t=>`<div style="font-size:13px;display:flex;gap:8px"><span style="flex:1">${esc(t.name)}</span><span style="color:#f97316;font-size:12px">${t.models} modelos</span></div>`).join('')}
    </div>`;
  }
  el.innerHTML=html;
}

// ═══ INIT ═══
setVerse();
loadLogoAndTitle();
renderDashboard();
</script>
</body>
